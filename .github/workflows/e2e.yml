name: E2E Test

on:
  push: {}
  pull_request: {}
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Set up Docker
        uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d # v5
        with:
          version: latest

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2
        with:
          version: latest

      - name: Prepare default config
        run: cp config.docker.json config.json

      - name: Start dev compose
        run: docker compose -f docker-compose.dev.yaml up --wait --build

      - name: bun install
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Cypress run
        uses: cypress-io/github-action@4c06c48f3ffea349b7189aa06dfcda47a9fa7b92 # v7
        with:
          install: false
          package-manager-cache: false
          working-directory: frontend
          wait-on: 'http://localhost:8080'
        env:
          COMMIT_INFO_BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>cbzViewer</title>
  <meta content="{{ .SentryBaggage }}" name="baggage" />
  <meta content="{{ .SentryTrace }}" name="sentry-trace" />
</head>

<body data-sentry-dsn="{{ .SentryDsn }}" data-server-host="{{ .ServerHost }}">
  <div id="app"></div>
  <script>
    (() => {
      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      const updateTheme = () => {
          document.documentElement.dataset.bsTheme = mediaQuery.matches ? 'dark' : 'light';
      };
      updateTheme();
      mediaQuery.addEventListener('change', updateTheme);
    })();
  </script>
  <script src="/src/main.ts" type="module"></script>
</body>

</html>
